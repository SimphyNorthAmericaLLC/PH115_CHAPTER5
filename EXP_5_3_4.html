<h3>Spring ↔ RLC Period Equivalence</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np

def damped_spring_period(m, k, b):
    """Calculate the period of a damped spring."""
    omega_0 = np.sqrt(k / m)
    zeta = b / (2 * np.sqrt(m * k))
    omega_d = omega_0 * np.sqrt(1 - zeta**2)
    period = 2 * np.pi / omega_d
    return period

def solve_for_L(T_spring, R, C, initial_L=0.1):
    """
    Solve for inductance L given the period of the damped spring,
    resistance R, and capacitance C.
    Uses an iterative approach to find L.
    """
    omega_0_RLC = 2 * np.pi / T_spring
    
    # Initial guess for L
    L = initial_L
    for _ in range(100):  # Maximum number of iterations
        # Calculate the damping ratio
        zeta = R / (2 * np.sqrt(L / C))
        
        # Ensure that the damping ratio is valid
        if zeta >= 1:
            print("Warning: Damping ratio is critically damped or overdamped.")
            break
        
        # Calculate the current omega_d based on the guessed L
        omega_d = omega_0_RLC * np.sqrt(1 - zeta**2)
        
        # Update L based on the desired period
        new_L = 1 / (omega_0_RLC**2 * C * (1 - (R / (2 * np.sqrt(L / C)))**2))
        
        # Check for convergence
        if np.isclose(new_L, L, rtol=1e-4):
            return new_L
        L = new_L  # Update L for the next iteration
    
    raise RuntimeError("Could not converge to a solution for L")

# Given parameters for the damped spring
m = 1.0  # Mass in kg
k = 10.0  # Spring constant in N/m
b = 0.5  # Damping coefficient in kg/s

# Given parameters for the RLC circuit
R = 1.0  # Resistance in Ω
C = 0.01  # Capacitance in F

# Display chosen values
print("Chosen Values:")
print(f"Mass (m): {m} kg")
print(f"Spring Constant (k): {k} N/m")
print(f"Damping Coefficient (b): {b} kg/s")
print(f"Resistance (R): {R} Ω")
print(f"Capacitance (C): {C} F")

# Calculate the period of the damped spring
T_spring = damped_spring_period(m, k, b)
print(f"Damped Spring Period: {T_spring:.4f} seconds")

# Calculate the inductance L
L = solve_for_L(T_spring, R, C)
print(f"Calculated Inductance L: {L:.4f} H")

<script>

let pyodideReady = loadPyodide();

`);
        await pyodide.runPythonAsync(codeEl.value);

        let stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");

    } catch(err){
        output.textContent = String(err);
    }
}
