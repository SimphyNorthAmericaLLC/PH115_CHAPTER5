<style>
body{background:#1e1e1e;color:white;font-family:monospace;padding:15px;}
.editor{display:flex;border:1px solid #444;height:340px;}
#lineNumbers{background:#111;color:#00ff00;padding:10px 8px;margin:0;text-align:right;overflow:hidden;white-space:pre;user-select:none;}

<body>

<h3>Damped RLC Energy Simulation</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt

# Circuit parameters
R = 0.1  # Resistance in ohms
C = 10e-6  # Capacitance in farads
L = 0.1  # Inductance in henries
V_initial = 10  # Initial voltage in volts

# Derived parameters
omega_0 = 1 / np.sqrt(L * C)  # Natural angular frequency
zeta = R / (2 * np.sqrt(L / C))  # Damping ratio

# Time range
t = np.linspace(0, 0.05, 1000)  # Time in seconds

# Voltage across capacitor as function of time (for underdamped case)
if zeta < 1:
    omega_d = omega_0 * np.sqrt(1 - zeta**2)  # Damped angular frequency
    Vc = V_initial * np.exp(-zeta * omega_0 * t) * np.cos(omega_d * t)

    # Calculate energies
    U_electric = 0.5 * C * Vc**2  # Electric energy in capacitor
    I = -C * (np.gradient(Vc, t))  # Current through the circuit
    U_magnetic = 0.5 * L * I**2  # Magnetic energy in inductor
    P_dissipated = R * I**2  # Power dissipated in resistor
    U_dissipated = np.cumsum(P_dissipated * np.gradient(t))  # Energy dissipated over time

    # Plotting the energies
    plt.figure(figsize=(10, 6))

    plt.plot(t, U_electric, label="Electric Energy (Capacitor)")
    plt.plot(t, U_magnetic, label="Magnetic Energy (Inductor)")
    plt.plot(t, U_dissipated, label="Dissipated Energy (Resistor)")

    plt.xlabel("Time (s)")
    plt.ylabel("Energy (J)")
    plt.title("Energies in a Damped RLC Circuit")
    plt.legend()
    plt.grid()
    plt.tight_layout()

else:
    print("The circuit is overdamped or critically damped, and this code assumes an underdamped response.")
</textarea>
</div>

<button onclick="run()">Run Code</button>
<button onclick="savePNG()">Save PNG</button>
<button onclick="savePDF()">Save PDF</button>



<div id="plotBox">
<img id="plot1">
</div>

<script>
const codeEl=document.getElementById("code");
const lineNumbers=document.getElementById("lineNumbers");
const plotBox=document.getElementById("plotBox");


function updateLineNumbers(){
    const lines=codeEl.value.split("\n").length;
    let nums="";
    for(let i=1;i<=lines;i++) nums+=i+"\n";
    lineNumbers.textContent=nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", ()=> lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

let pyodideReady = loadPyodide();

async function run(){
    plotBox.style.display="none";
    
    let pyodide = await pyodideReady;
    await pyodide.loadPackage(["numpy","matplotlib"]);
    await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
import matplotlib.pyplot as plt
plt.close('all')
from io import BytesIO
import base64
`);
    await pyodide.runPythonAsync(codeEl.value);

    const figCount = await pyodide.runPythonAsync("len(plt.get_fignums())");
    if (figCount > 0) {
        let img = await pyodide.runPythonAsync(`
buf=BytesIO()
plt.savefig(buf,format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);
        document.getElementById("plot1").src="data:image/png;base64,"+img;
        plotBox.style.display="block";

        await pyodide.runPythonAsync(`
plt.savefig("plot.png")
plt.savefig("plot.pdf")
`);
    }

}


async function savePNG(){
    let pyodide = await pyodideReady;
    let f = pyodide.FS.readFile("plot.png");
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f],{type:"image/png"}));
    a.download="plot.png";
    a.click();
}

async function savePDF(){
    let pyodide = await pyodideReady;
    let f = pyodide.FS.readFile("plot.pdf");
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([f],{type:"application/pdf"}));
    a.download="plot.pdf";
    a.click();
}

</script>

</body>
